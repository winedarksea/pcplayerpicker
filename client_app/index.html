    <!-- Apply dark/light class before first paint to avoid flash -->
    <script>
        (function() {
            var mode = localStorage.getItem('pcpp_dark_mode');
            var dark = mode
                ? mode === 'dark'
                : !!(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
            var themeMeta = document.querySelector("meta[name='theme-color']");
            if (themeMeta) {
                themeMeta.setAttribute('content', dark ? '#000000' : '#f8fafc');
            }
            var appleMeta = document.querySelector("meta[name='apple-mobile-web-app-status-bar-style']");
            if (appleMeta) {
                appleMeta.setAttribute('content', dark ? 'black-translucent' : 'default');
            }
            if (dark) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5712GF6167"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-5712GF6167');
    </script>
