<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="maskBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="512" height="512" fill="url(#maskBg)"/>

  <!-- Inner container -->
  <rect x="64" y="64" width="384" height="384" rx="104" fill="#0f172a"/>

  <!-- Top bar (widest) — 4 dots evenly spaced at 162, 222, 290, 350 (gap=60) -->
  <rect x="88" y="112" width="336" height="68" rx="34" fill="#1e293b"/>
  <circle cx="162" cy="146" r="20" fill="#67e8f9"/>
  <circle cx="222" cy="146" r="20" fill="#67e8f9"/>
  <circle cx="290" cy="146" r="20" fill="#f59e0b"/>
  <circle cx="350" cy="146" r="20" fill="#f59e0b"/>

  <!-- Middle bar — 2 dots at 222, 290 (same inner spacing) -->
  <rect x="128" y="222" width="256" height="68" rx="34" fill="#1e293b"/>
  <circle cx="222" cy="256" r="20" fill="#67e8f9"/>
  <circle cx="290" cy="256" r="20" fill="#f59e0b"/>

  <!-- Bottom bar (narrowest) — 1 merged dot at center -->
  <rect x="180" y="332" width="152" height="68" rx="34" fill="#1e293b"/>
  <circle cx="256" cy="366" r="20" fill="#34d399"/>
</svg>
